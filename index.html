<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zpeak TTS Demo</title>
<style>
    /* Apple-like clean UI */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f5f5f7;
        color: #1c1c1e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        padding: 40px 20px;
    }

    h2 {
        font-weight: 600;
        margin-bottom: 20px;
    }

    textarea {
        width: 100%;
        max-width: 500px;
        height: 200px; /* big textarea */
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #d1d1d6;
        font-size: 16px;
        resize: none;
        margin-bottom: 20px;
        background-color: #fff;
    }

    select, button {
        padding: 10px 16px;
        font-size: 16px;
        border-radius: 12px;
        border: 1px solid #d1d1d6;
        margin: 5px 0;
        cursor: pointer;
    }

    button {
        background-color: #007aff;
        color: white;
        border: none;
        transition: background 0.2s ease;
    }

    button:hover {
        background-color: #005bb5;
    }

    audio {
        margin-top: 20px;
        width: 100%;
        max-width: 500px;
        border-radius: 12px;
        outline: none;
    }

    .control-group {
        display: flex;
        flex-direction: column;
        max-width: 500px;
        width: 100%;
    }

    label {
        margin-bottom: 5px;
        font-weight: 500;
    }

    /* Spinner Loading */
    #loading {
        display: none;
        margin: 10px 0;
        font-weight: 500;
        color: #007aff;
    }

    #loading::after {
        content: '';
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 3px solid #007aff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-left: 8px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    #duration {
        margin-top: 10px;
        font-weight: 500;
        color: #1c1c1e;
    }
</style>

<script type="module">
import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/+esm";

// List of voices exactly as Gradio expects
const voices = [
    "Aria — US Female, Natural",
    "Guy — US Male, Natural",
    "Jenny — US Female, Friendly",
    "Andrew — US Male, Casual",
    "Sonia — UK Female, Natural",
    "Ryan — UK Male, Natural",
    "Libby — UK Female, Friendly",
    "Natasha — AU Female, Natural",
    "William — AU Male, Natural",
    "Neerja — IN Female, Natural",
    "Prabhat — IN Male, Natural",
    "Asilia — KE Female, Natural",
    "Chilemba — KE Male, Natural",
    "Leah — ZA Female, Natural",
    "Luke — ZA Male, Natural",
    "Emily — IE Female, Natural",
    "Connor — IE Male, Natural"
];

// Populate dropdown
window.addEventListener("DOMContentLoaded", () => {
    const voiceSelect = document.getElementById("voice");
    voices.forEach(v => {
        const option = document.createElement("option");
        option.value = v;  // send exact string to Gradio
        option.textContent = v;
        voiceSelect.appendChild(option);
    });
});

async function generateSpeech() {
    const text = document.getElementById("text").value;
    const voice = document.getElementById("voice").value;
    const loading = document.getElementById("loading");
    const durationDiv = document.getElementById("duration");

    try {
        // Show loading
        loading.style.display = "block";
        durationDiv.textContent = "";

        // Start time
        const startTime = performance.now();

        const client = await Client.connect("JasonKishore007/Zpeak");

        const result = await client.predict("/synthesize", [
            text,
            voice,  
            0,
            0
        ]);

        // End time
        const endTime = performance.now();
        const duration = ((endTime - startTime) / 1000).toFixed(2);

        console.log(`TTS generation took ${duration} seconds`);
        durationDiv.textContent = `Time taken: ${duration} seconds`;

        const audioURL = result.data[0].url;
        const player = document.getElementById("audioPlayer");
        player.src = audioURL;
        player.play();
    } catch (err) {
        console.error("Error generating speech:", err);
        alert("Failed to generate speech. Please try again.");
    } finally {
        // Hide loading
        loading.style.display = "none";
    }
}

window.generateSpeech = generateSpeech;
</script>
</head>

<body>

<h2>Zpeak TTS Demo</h2>

<div class="control-group">
    <label for="text">Enter Text</label>
    <textarea id="text" rows="10">This is Testing</textarea>
</div>

<div class="control-group">
    <label for="voice">Select Voice</label>
    <select id="voice"></select>
</div>

<button onclick="generateSpeech()">Generate Speech</button>

<div id="loading">Generating speech, please wait...</div>
<audio id="audioPlayer" controls></audio>
<div id="duration"></div>

</body>
</html>
